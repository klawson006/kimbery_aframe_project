<html>
 <head>
   <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
 </head>
 <body>
   <a-scene>
     <a-assets>
       <img id="sky" src="mountains1.jpg">
       <img id="grass" src="grass1.jpg">
       
       <a-box position="0 3 -4" rotation="0 45 0"
        color="#4CC3D9">
      </a-box>
     

       <a-asset-item
         id="character"
         src="codey.gltf"></a-asset-item>
     </a-assets>


     <a-sky src="#sky"></a-sky>
     <a-plane
       src="#grass"
       rotation="-90 0 0"
       width="20"
       height="20"></a-plane>

        <a-entity
       text="value: Welcome!; color: #C0AFDE; align: center"
       position="0 3 -4"
       scale="6 6 6"
       animation="property: object3D.position.y;
   to: 2.2;
   dir: alternate;
   dur: 2000;
   loop: true"></a-entity> 
     <a-entity
       gltf-model="#codey"
       position="0 2 -4"

     <a-text
       value="Welcome!"
       color="#FFD500"
       align="center"
       position="0 3 -4"></a-text>
     <!-- Add entity here: -->
     <a-gltf-model
       src="#character"
       position="0 2 -4"
       scale="0.5 0.5 0.5"></a-gltf-model>
   
   </a-scene>
 </body>
</html>
